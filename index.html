<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Builder</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background:#fff;
}

/* DRAGGABLE */
.draggable {
  position:absolute;
  cursor:move;
  user-select:none;
}

/* TITLE */
#title {
  left:50px;
  top:20px;
  font-size:40px;
  font-weight:bold;
}

/* SEARCH */
#search-container {
  top:80px;
  left:50%;
  transform:translateX(-50%);
}

#search-box {
  width:300px;
  padding:10px 20px;
  font-size:16px;
  border-radius:25px;
  border:1px solid #ccc;
}

/* SIDEBAR */
#sidebar {
  position:fixed;
  left:-260px;
  top:0;
  width:240px;
  height:100%;
  background:#4285F4;
  color:white;
  padding:10px;
  transition:0.3s;
  z-index:1000;
}

#sidebar.show { left:0; }

#sidebar button {
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:5px;
  font-weight:bold;
}

/* HELP */
#helpBox {
  display:none;
  position:fixed;
  right:20px;
  bottom:80px;
  width:280px;
  background:white;
  border:2px solid #4285F4;
  padding:15px;
  border-radius:10px;
  z-index:2000;
}

/* TOGGLE */
#toggleBtn {
  position:fixed;
  top:50%;
  right:10px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:#4285F4;
  color:white;
  border:none;
  font-size:24px;
}
</style>
</head>

<body>

<div id="title" class="draggable">Web Builder</div>

<div id="search-container" class="draggable">
  <input id="search-box" placeholder="Search pages..." onkeydown="searchPage(event)">
</div>

<div id="sidebar">
  <button onclick="home()">Home</button>
  <button onclick="addImage()">Add Image</button>
  <button onclick="addVideo()">Add Video</button>
  <button onclick="addText()">Add Text</button>
  <button onclick="addLink()">Add Link</button>
  <button onclick="toggleDelete()">🗑 Delete Mode</button>
  <button onclick="createPage()">+ New Page</button>
  <button onclick="savePage()">Save Page</button>
  <button onclick="howTo()">How to use</button>

  <hr>
  <div id="pageList"></div>
</div>

<button id="toggleBtn" onclick="toggleSidebar()">☰</button>

<div id="helpBox">
  <h3>How to use</h3>
  <ul>
    <li>Drag title, search, images, videos, text, links</li>
    <li>Add items from menu</li>
    <li>Delete mode removes items</li>
    <li>Save and switch pages</li>
  </ul>
  <button onclick="toggleHelp()">Close</button>
</div>

<script>

let pages = {};
let currentPage = "Home";
let deleteMode = false;

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("show");
}

/* DRAG FIXED (TITLE WORKS NOW) */
function makeDraggable(el){
  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  el.addEventListener("mousedown", (e) => {
    if(deleteMode) return;

    if(e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

    dragging = true;

    const rect = el.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    el.style.position = "absolute";
  });

  document.addEventListener("mousemove", (e) => {
    if(!dragging) return;

    el.style.left = (e.clientX - offsetX) + "px";
    el.style.top = (e.clientY - offsetY) + "px";
    el.style.transform = "none";
  });

  document.addEventListener("mouseup", () => {
    dragging = false;
  });
}

/* INIT DRAGGABLE ELEMENTS */
makeDraggable(document.getElementById("title"));
makeDraggable(document.getElementById("search-container"));

/* DELETE MODE */
function toggleDelete(){
  deleteMode = !deleteMode;
  alert(deleteMode ? "Delete ON" : "Delete OFF");
}

/* CREATE ITEMS */
function createItem(el){
  const wrap = document.createElement("div");
  wrap.className = "draggable";
  wrap.style.left = "120px";
  wrap.style.top = "150px";
  wrap.appendChild(el);

  if(deleteMode) wrap.onclick = () => wrap.remove();

  document.body.appendChild(wrap);
  makeDraggable(wrap);
}

/* ADD IMAGE */
function addImage(){
  const url = prompt("Image URL");
  if(!url) return;
  const img = document.createElement("img");
  img.src = url;
  img.style.width = "200px";
  createItem(img);
}

/* ADD VIDEO */
function addVideo(){
  const url = prompt("Video URL");
  if(!url) return;
  const vid = document.createElement("video");
  vid.src = url;
  vid.controls = true;
  vid.style.width = "300px";
  createItem(vid);
}

/* ADD TEXT */
function addText(){
  const div = document.createElement("div");
  div.contentEditable = true;
  div.innerText = "Text";
  createItem(div);
}

/* ADD LINK */
function addLink(){
  const url = prompt("URL");
  if(!url) return;
  const a = document.createElement("a");
  a.href = url;
  a.target = "_blank";
  a.innerText = url;
  createItem(a);
}

/* SAVE PAGE */
function savePage(){
  const name = prompt("Page name");
  if(!name) return;

  const data = [];

  document.querySelectorAll(".draggable").forEach(el=>{
    if(el.id === "title" || el.id === "search-container") return;

    data.push({
      html: el.innerHTML,
      left: el.style.left,
      top: el.style.top
    });
  });

  pages[name] = data;
  refreshPages();
  alert("Saved!");
}

/* LOAD PAGE */
function loadPage(name){
  currentPage = name;

  document.querySelectorAll(".draggable").forEach(el=>{
    if(el.id !== "title" && el.id !== "search-container") el.remove();
  });

  document.getElementById("search-container").style.display =
    name === "Home" ? "block" : "none";

  (pages[name] || []).forEach(item=>{
    const d = document.createElement("div");
    d.className = "draggable";
    d.style.left = item.left;
    d.style.top = item.top;
    d.innerHTML = item.html;
    makeDraggable(d);
    document.body.appendChild(d);
  });
}

/* PAGES LIST */
function refreshPages(){
  const box = document.getElementById("pageList");
  box.innerHTML = "<b>Pages</b>";

  Object.keys(pages).forEach(p=>{
    const b = document.createElement("button");
    b.innerText = p;
    b.onclick = () => loadPage(p);
    box.appendChild(b);
  });
}

/* HOME */
function home(){
  loadPage("Home");
}

/* NEW PAGE */
function createPage(){
  const name = prompt("Page name");
  if(!name) return;
  pages[name] = [];
  refreshPages();
  loadPage(name);
}

/* SEARCH */
function searchPage(e){
  if(e.key === "Enter"){
    const q = e.target.value;
    if(pages[q]) loadPage(q);
    else alert("Not found");
  }
}

/* HELP */
function howTo(){
  toggleHelp();
}

function toggleHelp(){
  const box = document.getElementById("helpBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

/* INIT */
refreshPages();
loadPage("Home");

</script>

</body>
</html>
