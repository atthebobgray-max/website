<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Builder</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background:#fff;
}

.draggable {
  position:absolute;
  cursor:move;
  user-select:none;
}

/* TITLE */
#title {
  left:50px;
  top:20px;
  font-size:40px;
  font-weight:bold;
}

/* SEARCH */
#search-container {
  top:80px;
  left:50%;
  transform:translateX(-50%);
}

#search-box {
  width:300px;
  padding:10px 20px;
  font-size:16px;
  border-radius:25px;
  border:1px solid #ccc;
}

/* SIDEBAR */
#sidebar {
  position:fixed;
  left:-260px;
  top:0;
  width:240px;
  height:100%;
  background:#4285F4;
  color:white;
  padding:10px;
  transition:0.3s;
}

#sidebar.show { left:0; }

#sidebar button {
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}

/* HELP BOX */
#helpBox {
  display:none;
  position:fixed;
  right:20px;
  bottom:80px;
  width:280px;
  background:white;
  border:2px solid #4285F4;
  padding:15px;
  border-radius:10px;
  z-index:2000;
}

#toggleBtn {
  position:fixed;
  top:50%;
  right:10px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:#4285F4;
  color:white;
  border:none;
  font-size:24px;
}
</style>
</head>

<body>

<div id="title" class="draggable">Web Builder</div>

<div id="search-container" class="draggable">
  <input id="search-box" placeholder="Search pages..." onkeydown="searchPage(event)">
</div>

<div id="sidebar">
  <button onclick="home()">Home</button>
  <button onclick="addImage()">Add Image</button>
  <button onclick="addVideo()">Add Video</button>
  <button onclick="addText()">Add Text</button>
  <button onclick="addLink()">Add Link</button>
  <button onclick="toggleDelete()">🗑 Delete Mode</button>
  <button onclick="createPage()">+ New Page</button>
  <button onclick="savePage()">Save Page</button>
  <button onclick="howTo()">How to use</button>

  <hr>
  <div id="pageList"></div>
</div>

<button id="toggleBtn" onclick="toggleSidebar()">☰</button>

<div id="helpBox">
  <h3>How to use</h3>
  <ul>
    <li>Drag title, search bar, images, videos, text, or links</li>
    <li>Add images/videos/text/links from the menu</li>
    <li>Use Delete Mode to remove items</li>
    <li>Save pages and switch between them using sidebar</li>
    <li>Search pages from Home screen</li>
  </ul>
  <button onclick="toggleHelp()">Close</button>
</div>

<script>
let pages = {};
let currentPage = "Home";
let deleteMode = false;

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("show");
}

/* PAGE LIST */
function refreshPageList(){
  const list = document.getElementById("pageList");
  list.innerHTML = "<b>Pages</b><br>";

  Object.keys(pages).forEach(name=>{
    const b = document.createElement("button");
    b.innerText = name;
    b.onclick = ()=>loadPage(name);
    list.appendChild(b);
  });
}

/* UNIVERSAL DRAG FUNCTION */
function makeDraggable(el){
  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  el.addEventListener("mousedown", (e) => {
    if (deleteMode) return;
    // Allow input typing, links, videos interaction
    if(e.target.tagName==="INPUT" || e.target.tagName==="TEXTAREA" || e.target.tagName==="VIDEO" || e.target.tagName==="A") return;

    dragging = true;
    offsetX = e.clientX - el.getBoundingClientRect().left;
    offsetY = e.clientY - el.getBoundingClientRect().top;

    el.style.position = "absolute";
  });

  document.addEventListener("mousemove", (e) => {
    if (!dragging) return;

    el.style.left = (e.clientX - offsetX) + "px";
    el.style.top = (e.clientY - offsetY) + "px";
    el.style.transform = "none";
  });

  document.addEventListener("mouseup", () => {
    dragging = false;
  });
}

/* DELETE MODE */
function toggleDelete(){
  deleteMode = !deleteMode;
  alert(deleteMode ? "Delete mode ON (click items to remove)" : "Delete mode OFF");
}

/* ITEM CREATION */
function createItem(el){
  const wrapper = document.createElement("div");
  wrapper.className = "draggable";
  wrapper.style.position = "absolute";
  wrapper.style.left = "120px";
  wrapper.style.top = "150px";
  wrapper.appendChild(el);

  if(deleteMode) wrapper.onclick=()=>wrapper.remove();

  document.body.appendChild(wrapper);
  makeDraggable(wrapper);
}

/* ADD ITEMS */
function addImage(){
  const u = prompt("Image URL");
  if(!u) return;
  const i = document.createElement("img");
  i.src = u;
  i.style.width="200px";
  createItem(i);
}

function addVideo(){
  const u = prompt("Video URL");
  if(!u) return;
  const v = document.createElement("video");
  v.src=u;
  v.controls=true;
  v.style.width="300px";
  createItem(v);
}

function addText(){
  const d = document.createElement("div");
  d.contentEditable=true;
  d.innerText="Text";
  createItem(d);
}

function addLink(){
  const u = prompt("URL");
  if(!u) return;
  const a = document.createElement("a");
  a.href=u;
  a.target="_blank";
  a.innerText=u;
  createItem(a);
}

/* SAVE PAGE */
function savePage(){
  const name = prompt("Page name");
  if(!name) return;

  const data = [];
  document.querySelectorAll(".draggable").forEach(el=>{
    if(el.id==="search-container" || el.id==="title") return;
    data.push({
      html: el.innerHTML,
      x: el.style.left,
      y: el.style.top
    });
  });

  pages[name] = data;
  refreshPageList();
  alert("Saved!");
}

/* LOAD PAGE */
function loadPage(name){
  currentPage = name;

  document.querySelectorAll(".draggable").forEach(el=>{
    if(el.id !== "search-container" && el.id !== "title") el.remove();
  });

  document.getElementById("search-container").style.display =
    name==="Home" ? "block" : "none";

  (pages[name] || []).forEach(item=>{
    const d = document.createElement("div");
    d.className="draggable";
    d.style.left=item.x;
    d.style.top=item.y;
    d.innerHTML=item.html;
    makeDraggable(d);
    document.body.appendChild(d);
  });
}

/* HOME */
function home(){ loadPage("Home"); }

/* NEW PAGE */
function createPage(){
  const n = prompt("Page name");
  if(!n) return;
  pages[n] = [];
  loadPage(n);
  refreshPageList();
}

/* SEARCH */
function searchPage(e){
  if(e.key==="Enter"){
    const q = e.target.value;
    if(pages[q]) loadPage(q);
    else alert("Page not found");
  }
}

/* HELP */
function howTo(){ toggleHelp(); }
function toggleHelp(){
  const h = document.getElementById("helpBox");
  h.style.display = (h.style.display==="block") ? "none" : "block";
}

/* INIT */
makeDraggable(document.getElementById("title"));
makeDraggable(document.getElementById("search-container"));
refreshPageList();
loadPage("Home");

</script>
</body>
</html>
