<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Builder</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background:#fff;
  transition: background 1.5s ease;
}

/* DRAGGABLE */
.draggable {
  position:absolute;
  cursor:move;
  user-select:none;
}

/* TITLE */
#title {
  left:50px;
  top:20px;
  font-size:40px;
  font-weight:bold;
}

/* SEARCH */
#search-container {
  top:80px;
  left:50%;
  transform:translateX(-50%);
}

#search-box {
  width:300px;
  padding:10px 20px;
  font-size:16px;
  border-radius:25px;
  border:1px solid #ccc;
}

/* SIDEBAR */
#sidebar {
  position:fixed;
  left:-260px;
  top:0;
  width:240px;
  height:100%;
  background:#4285F4;
  color:white;
  padding:10px;
  transition:0.3s;
  z-index:1000;
}

#sidebar.show { left:0; }

#sidebar button {
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}

/* HELP BOX */
#helpBox {
  display:none;
  position:fixed;
  right:20px;
  bottom:80px;
  width:280px;
  background:white;
  border:2px solid #4285F4;
  padding:15px;
  border-radius:10px;
  z-index:2000;
}

/* TOGGLE */
#toggleBtn {
  position:fixed;
  top:50%;
  right:10px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:#4285F4;
  color:white;
  border:none;
  font-size:24px;
}
</style>
</head>

<body>

<div id="title" class="draggable">Web Builder</div>

<div id="search-container" class="draggable">
  <input id="search-box" placeholder="Search pages..." onkeydown="searchPage(event)">
</div>

<div id="sidebar">
  <button onclick="home()">Home</button>
  <button onclick="addImage()">Add Image</button>
  <button onclick="addVideo()">Add Video</button>
  <button onclick="addText()">Add Text</button>
  <button onclick="pickColor()">Background Color</button>
  <button onclick="toggleDelete()">🗑 Delete Mode</button>
  <button onclick="createPage()">+ New Page</button>
  <button onclick="savePage()">Save Page</button>
  <button onclick="howTo()">How to use</button>

  <hr>
  <div id="pageList"></div>
</div>

<button id="toggleBtn" onclick="toggleSidebar()">☰</button>

<div id="helpBox">
  <h3>How to use</h3>
  <ul>
    <li>Drag everything on screen</li>
    <li>Add text/images/videos from menu</li>
    <li>Change background color smoothly</li>
    <li>Delete mode removes items</li>
    <li>Save and switch pages</li>
  </ul>
  <button onclick="toggleHelp()">Close</button>
</div>

<script>

let pages = {};
let deleteMode = false;

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("show");
}

/* DRAG */
function makeDraggable(el){
  let dragging = false;
  let ox = 0;
  let oy = 0;

  el.onmousedown = (e)=>{
    if(deleteMode) return;
    if(e.target.tagName === "INPUT") return;

    dragging = true;
    const r = el.getBoundingClientRect();
    ox = e.clientX - r.left;
    oy = e.clientY - r.top;
  };

  document.onmousemove = (e)=>{
    if(!dragging) return;
    el.style.left = (e.clientX - ox) + "px";
    el.style.top = (e.clientY - oy) + "px";
    el.style.transform = "none";
  };

  document.onmouseup = ()=> dragging = false;
}

/* INIT DRAG */
makeDraggable(document.getElementById("title"));
makeDraggable(document.getElementById("search-container"));

/* CREATE ITEM */
function createItem(el){
  const wrap = document.createElement("div");
  wrap.className = "draggable";
  wrap.style.left = "120px";
  wrap.style.top = "150px";

  wrap.appendChild(el);

  if(deleteMode) wrap.onclick = ()=>wrap.remove();

  document.body.appendChild(wrap);
  makeDraggable(wrap);
}

/* ADD TEXT */
function addText(){
  const div = document.createElement("div");
  div.contentEditable = true;
  div.innerText = "New Text";
  div.style.padding = "5px";
  div.style.background = "white";
  createItem(div);
}

/* ADD IMAGE */
function addImage(){
  const url = prompt("Image URL");
  if(!url) return;
  const img = document.createElement("img");
  img.src = url;
  img.style.width = "200px";
  createItem(img);
}

/* ADD VIDEO */
function addVideo(){
  const url = prompt("Video URL");
  if(!url) return;
  const vid = document.createElement("video");
  vid.src = url;
  vid.controls = true;
  vid.style.width = "300px";
  createItem(vid);
}

/* ✅ SMOOTH BACKGROUND COLOR */
function pickColor(){
  const picker = document.createElement("input");
  picker.type = "color";

  picker.oninput = () => {
    document.body.style.background = picker.value;
  };

  picker.click();
}

/* DELETE MODE */
function toggleDelete(){
  deleteMode = !deleteMode;
  alert(deleteMode ? "Delete ON" : "Delete OFF");
}

/* SAVE */
function savePage(){
  const name = prompt("Page name:");
  if(!name) return;

  pages[name] = document.body.innerHTML;
  alert("Saved!");
}

/* LOAD */
function loadPage(name){
  document.body.innerHTML = pages[name];
  location.reload();
}

/* HOME */
function home(){
  location.reload();
}

/* NEW PAGE */
function createPage(){
  const name = prompt("Page name:");
  if(!name) return;
  pages[name] = document.body.innerHTML;
}

/* SEARCH */
function searchPage(e){
  if(e.key === "Enter"){
    const q = e.target.value;
    if(pages[q]){
      document.body.innerHTML = pages[q];
      location.reload();
    } else {
      alert("Not found");
    }
  }
}

/* HELP */
function howTo(){
  const box = document.getElementById("helpBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

</script>

</body>
</html>
