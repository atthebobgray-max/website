<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Builder</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background:#ffffff;
  transition: background 1s ease;
}

/* EVERYTHING DRAGGABLE */
.draggable {
  position:absolute;
  cursor:move;
  user-select:none;
}

/* TITLE */
#title {
  left:50px;
  top:20px;
  font-size:40px;
  font-weight:bold;
  cursor:move;
}

/* SEARCH */
#search-container {
  top:80px;
  left:50%;
  transform:translateX(-50%);
}

#search-box {
  width:300px;
  padding:10px 20px;
  font-size:16px;
  border-radius:25px;
  border:1px solid #ccc;
}

/* SIDEBAR */
#sidebar {
  position:fixed;
  left:-260px;
  top:0;
  width:240px;
  height:100%;
  background:#4285F4;
  color:white;
  padding:10px;
  transition:0.3s;
  z-index:1000;
}

#sidebar.show { left:0; }

#sidebar button {
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}

/* HELP */
#helpBox {
  display:none;
  position:fixed;
  right:20px;
  bottom:80px;
  width:280px;
  background:white;
  border:2px solid #4285F4;
  padding:15px;
  border-radius:10px;
  z-index:2000;
}

/* TOGGLE */
#toggleBtn {
  position:fixed;
  top:50%;
  right:10px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:#4285F4;
  color:white;
  border:none;
  font-size:24px;
}
</style>
</head>

<body>

<!-- TITLE -->
<div id="title" class="draggable">Web Builder</div>

<!-- SEARCH -->
<div id="search-container" class="draggable">
  <input id="search-box" placeholder="Search pages...">
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <button onclick="changeTitle()">✏ Change Title</button>
  <button onclick="addText()">➕ Add Text</button>
  <button onclick="addImage()">Add Image</button>
  <button onclick="addVideo()">Add Video</button>
  <button onclick="pickColor()">Background Color</button>
  <button onclick="toggleHelp()">How to use</button>
</div>

<button id="toggleBtn" onclick="toggleSidebar()">☰</button>

<!-- HELP -->
<div id="helpBox">
  <h3>How to use</h3>
  <ul>
    <li>Drag title, text, images, videos</li>
    <li>Use sidebar buttons to add items</li>
    <li>Change background color</li>
  </ul>
  <button onclick="toggleHelp()">Close</button>
</div>

<script>

/* =========================
   GLOBAL DRAG SYSTEM (FIXED)
========================= */
let dragItem = null;
let offsetX = 0;
let offsetY = 0;

document.addEventListener("mousedown", (e) => {
  const target = e.target.closest(".draggable");
  if (!target) return;

  dragItem = target;

  const rect = target.getBoundingClientRect();
  offsetX = e.clientX - rect.left;
  offsetY = e.clientY - rect.top;

  target.style.position = "absolute";
});

document.addEventListener("mousemove", (e) => {
  if (!dragItem) return;

  dragItem.style.left = (e.clientX - offsetX) + "px";
  dragItem.style.top = (e.clientY - offsetY) + "px";
});

document.addEventListener("mouseup", () => {
  dragItem = null;
});

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("show");
}

/* CHANGE TITLE */
function changeTitle(){
  const t = prompt("New title:");
  if(t){
    document.getElementById("title").innerText = t;
  }
}

/* CREATE ITEM */
function createItem(el){
  const wrap = document.createElement("div");
  wrap.className = "draggable";
  wrap.style.left = "120px";
  wrap.style.top = "150px";
  wrap.appendChild(el);
  document.body.appendChild(wrap);
}

/* ADD TEXT */
function addText(){
  const box = document.createElement("div");
  box.contentEditable = true;
  box.innerText = "New Text";
  box.style.padding = "8px";
  box.style.background = "white";
  createItem(box);
}

/* ADD IMAGE */
function addImage(){
  const url = prompt("Image URL:");
  if(!url) return;

  const img = document.createElement("img");
  img.src = url;
  img.style.width = "200px";
  createItem(img);
}

/* ADD VIDEO */
function addVideo(){
  const url = prompt("Video URL:");
  if(!url) return;

  const vid = document.createElement("video");
  vid.src = url;
  vid.controls = true;
  vid.style.width = "300px";
  createItem(vid);
}

/* BACKGROUND COLOR */
function pickColor(){
  const input = document.createElement("input");
  input.type = "color";

  input.oninput = () => {
    document.body.style.background = input.value;
  };

  input.click();
}

/* HELP */
function toggleHelp(){
  const box = document.getElementById("helpBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

</script>

</body>
</html>
