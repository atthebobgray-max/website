<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Builder</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background:#ffffff;
  overflow:hidden;
}

.draggable{
  position:absolute;
  cursor:grab;
  user-select:none;
}

.draggable:active{
  cursor:grabbing;
}

#title{
  left:50%;
  top:40px;
  transform:translateX(-50%);
  font-size:48px;
  font-weight:bold;
  color:#4285F4;
  z-index:999;
}

#search-container{
  top:120px;
  left:50%;
  transform:translateX(-50%);
}

#search-box{
  width:400px;
  padding:12px 20px;
  border-radius:24px;
  border:1px solid #ccc;
  font-size:18px;
}

/* SIDEBAR */
#sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:240px;
  height:100%;
  background:#4285F4;
  color:white;
  padding:10px;
  transition:0.3s;
  z-index:1000;
}

#sidebar.show{ left:0; }

#sidebar button{
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}

#pageList button{
  background:#6aa0f8;
}

/* TOGGLE */
#toggleBtn{
  position:fixed;
  top:50%;
  right:10px;
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  background:#4285F4;
  color:white;
  font-size:24px;
  z-index:2000;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="title" class="draggable">Web Builder</div>

<div id="search-container" class="draggable">
  <input id="search-box" placeholder="Type page name & press Enter">
</div>

<div id="sidebar">
  <button onclick="goHome()">🏠 Home</button>

  <button onclick="changeTitle()">✏ Change Title</button>
  <button onclick="addText()">➕ Add Text</button>
  <button onclick="addImage()">🖼 Add Image</button>
  <button onclick="addVideo()">🎥 Add Video</button>
  <button onclick="pickColor()">🎨 Background</button>
  <button onclick="createPage()">📄 Add Page</button>
  <button onclick="downloadPage()">💾 Save</button>

  <hr>
  <div id="pageList"></div>
</div>

<button id="toggleBtn" onclick="toggleSidebar()">☰</button>

<script>

/* ================= DRAG ================= */
function enableDrag(el){
  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  el.addEventListener("pointerdown", (e)=>{
    dragging = true;
    const rect = el.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    el.setPointerCapture(e.pointerId);
  });

  el.addEventListener("pointermove", (e)=>{
    if(!dragging) return;

    let x = e.clientX - offsetX;
    let y = e.clientY - offsetY;

    const maxX = window.innerWidth - el.offsetWidth;
    const maxY = window.innerHeight - el.offsetHeight;

    if(x < 0) x = 0;
    if(y < 0) y = 0;
    if(x > maxX) x = maxX;
    if(y > maxY) y = maxY;

    el.style.left = x + "px";
    el.style.top = y + "px";
  });

  el.addEventListener("pointerup", ()=>{
    dragging = false;
  });
}

enableDrag(document.getElementById("title"));
enableDrag(document.getElementById("search-container"));

/* ================= SIDEBAR ================= */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("show");
}

/* ================= HOME BUTTON (NEW) ================= */
function goHome(){
  saveCurrent();
  currentPage = "Home";

  clearItems();

  document.getElementById("title").style.display = "block";
  document.getElementById("search-container").style.display = "block";

  updateList();
  history.pushState({page:"Home"},"","#Home");
}

/* ================= TITLE ================= */
function changeTitle(){
  const t = prompt("New title:");
  if(t) document.getElementById("title").innerText = t;
}

/* ================= PAGES ================= */

let pages = { Home:{elements:[]} };
let currentPage = "Home";

function saveCurrent(){
  if(!pages[currentPage]) return;

  pages[currentPage].elements = [];

  document.querySelectorAll(".page-item").forEach(el=>{
    pages[currentPage].elements.push({
      html: el.innerHTML,
      left: el.style.left,
      top: el.style.top
    });
  });
}

function clearItems(){
  document.querySelectorAll(".page-item").forEach(e=>e.remove());
}

function setHome(show){
  document.getElementById("title").style.display = show ? "block":"none";
  document.getElementById("search-container").style.display = show ? "block":"none";
}

function createPage(){
  const name = prompt("Page name:");
  if(!name || pages[name]) return;

  saveCurrent();
  pages[name] = {elements:[]};
  currentPage = name;

  clearItems();
  setHome(false);

  updateList();
}

function openPage(name){
  saveCurrent();
  currentPage = name;

  clearItems();

  setHome(name === "Home");

  pages[name].elements.forEach(d=>{
    const div = document.createElement("div");
    div.className="page-item draggable";
    div.innerHTML=d.html;
    div.style.left=d.left;
    div.style.top=d.top;
    document.body.appendChild(div);
    enableDrag(div);
  });

  updateList();
}

/* ================= LIST ================= */
function updateList(){
  const list = document.getElementById("pageList");
  list.innerHTML="";
  for(let p in pages){
    const b=document.createElement("button");
    b.innerText=p;
    b.onclick=()=>openPage(p);
    list.appendChild(b);
  }
}

/* ================= ITEMS ================= */
function createItem(el){
  const wrap=document.createElement("div");
  wrap.className="draggable page-item";
  wrap.style.left="120px";
  wrap.style.top="200px";
  wrap.appendChild(el);
  document.body.appendChild(wrap);
  enableDrag(wrap);
}

function addText(){
  const d=document.createElement("div");
  d.contentEditable=true;
  d.innerText="New Text";
  d.style.padding="8px";
  d.style.background="#eee";
  createItem(d);
}

function addImage(){
  const url=prompt("Image URL:");
  if(!url) return;
  const img=document.createElement("img");
  img.src=url;
  img.style.width="200px";
  createItem(img);
}

function addVideo(){
  const url=prompt("Video URL:");
  if(!url) return;
  const v=document.createElement("video");
  v.src=url;
  v.controls=true;
  v.style.width="300px";
  createItem(v);
}

function pickColor(){
  const i=document.createElement("input");
  i.type="color";
  i.oninput=()=>document.body.style.background=i.value;
  i.click();
}

function downloadPage(){
  saveCurrent();
  const blob=new Blob([document.documentElement.outerHTML],{type:"text/html"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="web-builder.html";
  a.click();
}

/* ================= SEARCH ================= */
document.getElementById("search-box").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    const q=e.target.value.trim();
    if(pages[q]) openPage(q);
    else alert("Page not found");
  }
});

updateList();

</script>

</body>
</html>
