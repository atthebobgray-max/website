<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Builder</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:0;
  padding:0;
  background:#ffffff;
  overflow:hidden;
}

/* DRAGGABLE */
.draggable{
  position:absolute;
  cursor:grab;
  user-select:none;
}

.draggable:active{
  cursor:grabbing;
}

/* TITLE */
#title{
  left:50px;
  top:20px;
  font-size:40px;
  font-weight:bold;
  z-index:999;
}

/* SEARCH */
#search-container{
  top:90px;
  left:50%;
  transform:translateX(-50%);
}

#search-box{
  width:300px;
  padding:10px 20px;
  border-radius:25px;
  border:1px solid #ccc;
  font-size:16px;
}

/* SIDEBAR */
#sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:240px;
  height:100%;
  background:#4285F4;
  color:white;
  padding:10px;
  transition:0.3s;
  z-index:2000;
}

#sidebar.show{
  left:0;
}

#sidebar button{
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}

/* TOGGLE */
#toggleBtn{
  position:fixed;
  top:50%;
  right:10px;
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  background:#4285F4;
  color:white;
  font-size:24px;
  z-index:3000;
}
</style>
</head>

<body>

<!-- TITLE NEVER REMOVED -->
<div id="title" class="draggable">Web Builder</div>

<!-- SEARCH -->
<div id="search-container" class="draggable">
  <input id="search-box" placeholder="Search...">
</div>

<!-- SIDEBAR -->
<div id="sidebar">

  <button onclick="changeTitle()">✏ Change Title</button>

  <button onclick="addText()">➕ Add Text</button>

  <button onclick="addImage()">🖼 Add Image</button>

  <button onclick="addVideo()">🎥 Add Video</button>

  <button onclick="pickColor()">🎨 Background Color</button>

  <button onclick="downloadPage()">💾 Save to Downloads</button>

</div>

<button id="toggleBtn" onclick="toggleSidebar()">☰</button>

<script>

/* =========================
   DRAG SYSTEM
========================= */

let dragItem = null;
let offsetX = 0;
let offsetY = 0;

function enableDrag(el){

  el.addEventListener("pointerdown", (e)=>{

    dragItem = el;

    const rect = el.getBoundingClientRect();

    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    el.setPointerCapture(e.pointerId);

  });

  el.addEventListener("pointermove", (e)=>{

    if(dragItem !== el) return;

    el.style.left = (e.clientX - offsetX) + "px";
    el.style.top = (e.clientY - offsetY) + "px";

  });

  el.addEventListener("pointerup", ()=>{

    dragItem = null;

  });
}

/* ENABLE DRAGGING */
enableDrag(document.getElementById("title"));
enableDrag(document.getElementById("search-container"));

/* =========================
   SIDEBAR
========================= */

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("show");
}

/* =========================
   TITLE
========================= */

function changeTitle(){

  const t = prompt("Enter new title:");

  if(t){
    document.getElementById("title").innerText = t;
  }
}

/* =========================
   CREATE ITEM
========================= */

function createItem(el){

  const wrap = document.createElement("div");

  wrap.className = "draggable";

  wrap.style.left = "120px";
  wrap.style.top = "160px";

  wrap.appendChild(el);

  document.body.appendChild(wrap);

  enableDrag(wrap);
}

/* =========================
   ADD TEXT
========================= */

function addText(){

  const box = document.createElement("div");

  box.contentEditable = true;

  box.innerText = "New Text";

  box.style.padding = "8px";
  box.style.background = "#eeeeee";
  box.style.borderRadius = "6px";
  box.style.minWidth = "100px";

  createItem(box);
}

/* =========================
   ADD IMAGE
========================= */

function addImage(){

  const url = prompt("Image URL:");

  if(!url) return;

  const img = document.createElement("img");

  img.src = url;
  img.style.width = "200px";

  createItem(img);
}

/* =========================
   ADD VIDEO
========================= */

function addVideo(){

  const url = prompt("Video URL:");

  if(!url) return;

  const vid = document.createElement("video");

  vid.src = url;
  vid.controls = true;
  vid.style.width = "300px";

  createItem(vid);
}

/* =========================
   BACKGROUND COLOR
========================= */

function pickColor(){

  const input = document.createElement("input");

  input.type = "color";

  input.oninput = ()=>{

    document.body.style.background = input.value;

  };

  input.click();
}

/* =========================
   SAVE TO DOWNLOADS
========================= */

function downloadPage(){

  /* MAKE SURE TITLE ALWAYS EXISTS */

  const title = document.getElementById("title");

  if(!title){
    alert("Title missing!");
    return;
  }

  const html = document.documentElement.outerHTML;

  const blob = new Blob([html], {
    type:"text/html"
  });

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");

  a.href = url;

  a.download = "web-builder.html";

  a.click();

  URL.revokeObjectURL(url);
}

</script>

</body>
</html>
