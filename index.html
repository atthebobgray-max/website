<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Builder</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background:#fff;
}

/* DRAGGABLE ITEMS */
.draggable {
  position:absolute;
  cursor:move;
  user-select:none;
}

/* TITLE */
#title {
  left:50px;
  top:20px;
  font-size:40px;
  font-weight:bold;
}

/* SEARCH / TOOLBAR */
#search-container {
  position:absolute;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  cursor:move;
}

#search-box {
  width:300px;
  padding:10px 20px;
  font-size:16px;
  border-radius:25px;
  border:1px solid #ccc;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
  cursor:text;
}

/* SIDEBAR */
#sidebar {
  position:fixed;
  left:-260px;
  top:0;
  width:240px;
  height:100%;
  background:#4285F4;
  color:white;
  padding:10px;
  transition:left 0.3s;
  z-index:1000;
}

#sidebar.show { left:0; }

#sidebar button {
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-weight:bold;
}

/* TOGGLE */
#toggleBtn {
  position:fixed;
  top:50%;
  right:10px;
  transform:translateY(-50%);
  width:50px;
  height:50px;
  border-radius:50%;
  background:#4285F4;
  color:white;
  font-size:24px;
  border:none;
  cursor:pointer;
}

/* HELP BOX */
#helpBox {
  display:none;
  position:fixed;
  right:20px;
  bottom:80px;
  width:280px;
  background:white;
  border:2px solid #4285F4;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  z-index:2000;
}
#helpBox h3 { margin-top:0; }
#helpBox ul { padding-left:18px; }
#helpBox button {
  margin-top:10px;
  padding:8px;
  width:100%;
  background:#4285F4;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="title">Web Builder</div>

<div id="search-container">
  <input id="search-box" placeholder="Search pages..." onkeydown="searchPage(event)">
</div>

<div id="sidebar">
  <button onclick="home()">Home</button>
  <button onclick="addImage()">Add Image</button>
  <button onclick="addVideo()">Add Video</button>
  <button onclick="addText()">Add Text</button>
  <button onclick="addLink()">Add Link</button>
  <button onclick="toggleDelete()">🗑 Delete Mode</button>
  <button onclick="createPage()">+ New Page</button>
  <button onclick="savePage()">Save Page</button>
  <button onclick="howTo()">How to use</button>

  <hr>
  <div id="pageList"></div>
</div>

<button id="toggleBtn" onclick="toggleSidebar()">☰</button>

<!-- HELP PANEL -->
<div id="helpBox">
  <h3>How to use</h3>
  <ul>
    <li>Drag items around the page</li>
    <li>Add images, videos, text, or links from the menu</li>
    <li>Click 🗑 Delete Mode then click items to remove them</li>
    <li>Save pages using "Save Page"</li>
    <li>Click page names in the sidebar to switch pages</li>
    <li>Home page shows the search bar</li>
  </ul>
  <button onclick="toggleHelp()">Close</button>
</div>

<input type="color" id="colorPicker" style="display:none">

<script>
let pages = {};
let currentPage = "Home";
let deleteMode = false;

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("show");
}

function refreshPageList(){
  const list = document.getElementById("pageList");
  list.innerHTML = "<b>Pages:</b><br>";
  Object.keys(pages).forEach(name=>{
    const btn = document.createElement("button");
    btn.innerText = name;
    btn.onclick = ()=>loadPage(name);
    list.appendChild(btn);
  });
}

/* DRAG */
function makeDraggable(el){
  let dragging=false, ox=0, oy=0;
  el.addEventListener("mousedown", e=>{
    if(deleteMode) return;
    dragging=true;
    ox=e.clientX-el.offsetLeft;
    oy=e.clientY-el.offsetTop;
  });
  document.addEventListener("mousemove", e=>{
    if(!dragging) return;
    el.style.left=(e.clientX-ox)+"px";
    el.style.top=(e.clientY-oy)+"px";
  });
  document.addEventListener("mouseup", ()=>dragging=false);
}

/* DELETE MODE */
function toggleDelete(){
  deleteMode = !deleteMode;
  alert(deleteMode ? "Delete mode ON (click items to remove)" : "Delete mode OFF");
  document.querySelectorAll(".draggable").forEach(el=>{
    el.onclick = deleteMode ? ()=>el.remove() : null;
  });
}

/* ITEM WRAPPER */
function createItem(el){
  const wrap = document.createElement("div");
  wrap.className="draggable";
  wrap.style.left="120px";
  wrap.style.top="150px";
  wrap.appendChild(el);
  makeDraggable(wrap);
  if(deleteMode) wrap.onclick = ()=>wrap.remove();
  document.body.appendChild(wrap);
}

/* IMAGE */
function addImage(){
  const url = prompt("Image URL:");
  if(!url) return;
  const img = document.createElement("img");
  img.src=url;
  img.style.width="200px";
  createItem(img);
}

/* VIDEO */
function addVideo(){
  const url = prompt("Video URL:");
  if(!url) return;
  const vid = document.createElement("video");
  vid.src=url;
  vid.controls=true;
  vid.style.width="300px";
  createItem(vid);
}

/* TEXT */
function addText(){
  const div=document.createElement("div");
  div.contentEditable=true;
  div.innerText="Text";
  div.style.padding="5px";
  createItem(div);
}

/* LINK */
function addLink(){
  const url=prompt("URL:");
  if(!url) return;
  const a=document.createElement("a");
  a.href=url;
  a.target="_blank";
  a.innerText=url;
  createItem(a);
}

/* SAVE PAGE */
function savePage(){
  const name = prompt("Page name:");
  if(!name) return;
  const data = [];
  document.querySelectorAll(".draggable").forEach(el=>{
    if(el.id==="search-container") return;
    data.push({
      html: el.innerHTML,
      x: el.style.left,
      y: el.style.top
    });
  });
  pages[name] = data;
  refreshPageList();
  alert("Saved!");
}

/* LOAD PAGE */
function loadPage(name){
  currentPage=name;
  document.querySelectorAll(".draggable").forEach(el=>{
    if(el.id!=="search-container") el.remove();
  });
  const search = document.getElementById("search-container");
  search.style.display = (name==="Home") ? "block" : "none";
  const data = pages[name];
  if(!data) return;
  data.forEach(item=>{
    const div=document.createElement("div");
    div.className="draggable";
    div.style.left=item.x;
    div.style.top=item.y;
    div.innerHTML=item.html;
    makeDraggable(div);
    document.body.appendChild(div);
  });
}

/* HOME */
function home(){
  loadPage("Home");
}

/* NEW PAGE */
function createPage(){
  const name=prompt("Page name:");
  if(!name) return;
  pages[name]=[];
  loadPage(name);
  refreshPageList();
}

/* SEARCH PAGES */
function searchPage(e){
  if(e.key==="Enter"){
    const q=e.target.value;
    if(pages[q]) loadPage(q);
    else alert("Page not found");
  }
}

/* HOW TO */
function howTo(){
  toggleHelp();
}

/* HELP PANEL */
function toggleHelp(){
  const box=document.getElementById("helpBox");
  box.style.display = (box.style.display==="none" || box.style.display==="") ? "
